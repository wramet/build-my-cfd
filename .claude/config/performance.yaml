# Claude Code Performance Optimization Configuration
# Settings for prompt caching, parallel agent execution, and enhanced prompts

# Parallel Execution Settings
parallel_execution:
  enabled: true
  max_concurrent_agents: 4
  timeout_seconds: 300

  # Agent groups that can run in parallel
  agent_groups:
    source_first_extraction:
      - researcher
      - engineer
    content_creation:
      - researcher
      - architect
    code_analysis:
      - engineer
      - deepseek-coder
    verification:
      - verifier
      - qc-agent

# Prompt Cache Settings
prompt_cache:
  enabled: true
  max_size_mb: 100
  auto_warm: true
  cache_dir: "/tmp/prompt_cache"

  # High-value prefixes to cache
  cached_prefixes:
    - name: "source_first"
      file: ".claude/rules/source-first.md"
      description: "Source-First methodology"
      estimated_tokens: 10000

    - name: "cfd_standards"
      file: ".claude/rules/cfd-standards.md"
      description: "CFD content standards"
      estimated_tokens: 5000

    - name: "verification_gates"
      file: ".claude/rules/verification-gates.md"
      description: "Verification gates"
      estimated_tokens: 4000

    - name: "project_instructions"
      file: "CLAUDE.md"
      description: "Project instructions"
      estimated_tokens: 3000

    - name: "roadmap"
      file: "roadmap.md"
      description: "CFD Engine roadmap"
      estimated_tokens: 8000

# Agent Enhancement Settings
agent_enhancement:
  constitutional_ai: true
  chain_of_thought: true
  verification_markers: true
  react_loop: true
  statistical_testing: true

# Agent Dependencies
agent_dependencies:
  researcher: []
  engineer: []
  architect: []
  verifier: [researcher, engineer]
  qc-agent: [engineer, translator]
  translator: []
  deepseek-chat: []
  deepseek-coder: []
  deepseek-chat-mcp: []
  deepseek-reasoner-mcp: []

# Performance Monitoring
monitoring:
  enabled: true
  stats_file: "/tmp/performance_stats.json"
  track_execution_time: true
  track_token_usage: true
  track_cache_hit_rate: true

# Expected Performance Improvements
expected_improvements:
  workflow_speed: "47%"  # 95s -> 50s
  token_cost_reduction: "90%"  # $24 -> $2.40
  agent_success_rate: "23%"  # 75% -> 92%
  verification_accuracy: "25%"  # 70% -> 95%
