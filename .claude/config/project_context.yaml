# Project Context for C++ & Software Engineering Through OpenFOAM
# This file provides domain-specific context for content generation

project:
  name: "C++ & Software Engineering Through OpenFOAM"
  goal: "Learn intermediate-to-advanced C++ coding, real-world software architecture, and performance optimization by studying OpenFOAM source code"
  approach: "Project-based learning using OpenFOAM as a case study of production C++ engineering"

learning_objectives:
  primary:
    - "Master intermediate-to-advanced C++ patterns (templates, CRTP, smart pointers, expression templates)"
    - "Understand how real-world C++ projects are architected (factory patterns, plugin systems, I/O)"
    - "Learn performance optimization techniques (profiling, SIMD, cache, parallelism)"
  secondary:
    - "Read and understand large C++ codebases confidently"
    - "Apply learned patterns to build a well-engineered 1D CFD solver"
    - "Develop benchmarking and profiling habits"

openfoam_as_teacher:
  why_openfoam:
    - "One of the largest open-source C++ projects (~1M lines)"
    - "Uses advanced C++ patterns extensively (templates, CRTP, RTS)"
    - "Performance-critical code with real optimization techniques"
    - "Well-structured architecture with clear separation of concerns"
  source_location: "openfoam_temp/"
  key_directories:
    - "src/OpenFOAM/ — Core library (containers, fields, memory, I/O)"
    - "src/finiteVolume/ — FVM framework (matrices, operators, schemes)"
    - "applications/solvers/ — Solver applications"
    - "wmake/ — Build system"

content_requirements:
  every_session_must_include:
    - "Source code reading from actual OpenFOAM .H/.C files"
    - "Concrete C++ pattern identification with file:line references"
    - "Implementation exercise applying the pattern"
    - "Comparison: how OpenFOAM does it vs alternatives"

  avoid:
    - "Purely theoretical content without source code examples"
    - "Generic C++ tutorials unconnected to OpenFOAM"
    - "Content that can't be verified against source"
    - "Skipping the WHY behind design decisions"

  code_ratio:
    minimum: 0.50  # At least 50% of content should be code-related
    target: 0.65   # Ideal: 65% code, 35% explanation

# Phase structure references phase_mapping.yaml
# Do NOT duplicate day ranges here — use phase_mapping.yaml as source of truth
content_structure:
  config_file: "phase_mapping.yaml"
  note: "See .claude/config/phase_mapping.yaml for day-to-phase mapping"

quality_gates:
  source_verification:
    - "All code snippets include file paths and line numbers"
    - "Class hierarchies verified from .H files (marked ⭐)"
    - "Design patterns identified with concrete OpenFOAM examples"

  practical_relevance:
    - "Pattern can be applied in mini-project"
    - "Implementation exercise is compilable"
    - "Benchmarks show measurable results (for performance sessions)"

  code_quality:
    - "C++ code follows OpenFOAM naming conventions"
    - "Code examples are syntactically correct"
    - "Memory management patterns properly demonstrated"

  structure_requirements:
    - "Source Code Reading section present"
    - "Implementation Exercise section present"
    - "Code snippets with language tags and file references"

success_metrics:
  immediate:
    - "Learner can read OpenFOAM source code and explain design decisions"
    - "Learner can identify C++ patterns in unfamiliar codebases"
    - "Learner can implement patterns independently"

  long_term:
    - "Can architect a small-to-medium C++ project using learned patterns"
    - "Can profile and optimize C++ code systematically"
    - "Can contribute to or extend OpenFOAM"

# Final project context (Phase 5)
capstone_project:
  name: "1D Advection-Diffusion Solver"
  description: "Well-engineered solver applying all learned C++ patterns"
  requirements:
    - "RTS-style scheme selection"
    - "LDU-based sparse matrix storage"
    - "Template-based Field<T> class"
    - "Expression template arithmetic"
    - "Dictionary-driven configuration"
    - "Performance profiling and benchmarks"
  comparison: "Design decisions documented and compared with OpenFOAM counterparts"
